# k8s/prometheus.yaml
#
# Deploys Prometheus inside Kubernetes.
# Prometheus needs its config file (what to scrape) provided via a ConfigMap.
#
# ConfigMap: a K8s object that stores plain text config files.
# We mount it into the Prometheus container as a file at runtime.

# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  # The key "prometheus.yml" becomes the filename when mounted as a volume.
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: "llm-backend"
        static_configs:
          # "backend" resolves to the backend Service inside the cluster.
          - targets: ["backend:8000"]

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            # Mount the ConfigMap into the container at this path.
            - name: config-volume
              mountPath: /etc/prometheus
      volumes:
        # This volume pulls its contents from the ConfigMap above.
        - name: config-volume
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090    # access Prometheus at localhost:30090

---
# ── Grafana ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030    # access Grafana at localhost:30030
