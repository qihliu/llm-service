# k8s/canary/backend-v1.yaml
#
# The STABLE backend. Serves model "facebook/opt-125m".
#
# Differences from the old canary setup:
#   - Label is "app: backend-v1" (not "app: backend") — this pod is NOT
#     directly reachable from outside. Only the router can reach it via
#     the ClusterIP Service "backend-v1".
#   - Has its own Service so the router can address it by DNS name.
#
# The router forwards requests for "facebook/opt-125m" to backend-v1:8000.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  labels:
    app: backend-v1
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-v1
  template:
    metadata:
      labels:
        app: backend-v1
        version: v1
    spec:
      containers:
        - name: backend
          image: llm-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000   # inference API
            - containerPort: 9090   # Prometheus metrics
          env:
            - name: MODEL_NAME
              value: "facebook/opt-125m"
            - name: VERSION
              value: "v1"
            - name: USE_VLLM
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10   # start checking early; will fail until model loads
            periodSeconds: 10
            failureThreshold: 18      # allow up to 3 min for model to load (18 * 10s)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"

---
# ClusterIP Service — reachable only inside the cluster.
# The router uses DNS name "backend-v1" to forward requests here.
# No nodePort — users cannot reach this directly.
apiVersion: v1
kind: Service
metadata:
  name: backend-v1
spec:
  selector:
    app: backend-v1
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
