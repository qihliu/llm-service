# k8s/canary/backend-v2.yaml
#
# The CANARY backend. Serves model "facebook/opt-125m-v2".
#
# In this demo both v1 and v2 use the same underlying model weights.
# In a real scenario, MODEL_NAME would point to a fine-tuned or larger model.
# The routing mechanic (router reads "model" field → dispatches here) is
# identical regardless of which model is actually loaded.
#
# The router forwards requests for "facebook/opt-125m-v2" to backend-v2:8000.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  labels:
    app: backend-v2
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-v2
  template:
    metadata:
      labels:
        app: backend-v2
        version: v2
    spec:
      containers:
        - name: backend
          image: llm-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000   # inference API
            - containerPort: 9090   # Prometheus metrics
          env:
            # MODEL_NAME: the real HuggingFace weights to load (must exist).
            - name: MODEL_NAME
              value: "facebook/opt-350m"
            # MODEL_ID: the logical name this deployment advertises in the API.
            # The router matches on this name, not MODEL_NAME.
            - name: MODEL_ID
              value: "facebook/opt-350m"
            - name: VERSION
              value: "v2"
            - name: USE_VLLM
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18      # allow up to 3 min for model to load (18 * 10s)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"

---
# ClusterIP Service — reachable only inside the cluster.
# The router uses DNS name "backend-v2" to forward requests here.
# No nodePort — users cannot reach this directly.
apiVersion: v1
kind: Service
metadata:
  name: backend-v2
spec:
  selector:
    app: backend-v2
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
