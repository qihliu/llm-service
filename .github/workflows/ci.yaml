  #       run: |
  #         mkdir -p ~/.kube
  #         echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
  #
  #     # Tell K8s to use the new image (triggers a rolling update)
  #     - name: Deploy
  #       run: |
  #         kubectl set image deployment/backend \
  #           backend=ghcr.io/${{ github.repository_owner }}/llm-backend:${{ github.sha }}
